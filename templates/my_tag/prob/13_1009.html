<div class="post">
 <div class="prob-titile">
  新斐波那契数列
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code><p>源源和阳阳在上了C语言课以后，听到老师提起了斐波那契数列，顿时产生了浓厚的兴趣，他们突发奇想，定义了一个新斐波那契数列，如果给出一个数字n，能不能马上知道新斐波那契数列第n个数是什么呢。</p>

<p>新斐波那契数列：</p>

<p>F(1)=1;</p>

<p>F(2)=1;</p>

<p>F(3)=1;</p>

<p>F(i)=F(i-1)+F(i-2)+F(i-3);</p>

<p>…</p>
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>第一行为一个整数n（n&lt;=30）。</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>新斐波那契数列第n个数。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>5</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>5</code></pre>
  </div>
 </div>
</div>
