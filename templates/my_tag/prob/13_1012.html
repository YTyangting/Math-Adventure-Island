<div class="post">
 <div class="prob-titile">
  硕哥的表达式
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code><p>硕哥又不想计算表达式的值了，于是他找上了你。</p>

<p>给出一个表达式,其中运算符仅包含+,-,*,/,^要求求出表达式的最终值。</p>

<p>数据可能会出现括号情况 还有可能出现多余括号情况。</p>

<p>数据保证不会出现&gt;maxlongint的数据。</p>

<p>数据可能出现负数情况。</p>

<p>样例解释</p>

<p>(2+2)^(1+1)=4^2=16</p>
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>一行字符串（长度&lt;=30），表示表达式。</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>表达式的值。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>(2+2)^(1+1)</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>16</code></pre>
  </div>
 </div>
</div>
