<div class="post">
 <div class="prob-titile">
  数列极差
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code><p>源源给阳阳出了道题目：他在黑板上写了N个正整数组成的一个数列，进行如下操作：每一次擦去其中的两个正整数a和b，然后在数列中加入一个新的正整数a×b+1，如此下去直至黑板上剩下一个数，在所有按这种操作方式最后得到的数中，最大的Max，最小的为Min，则该数列的极差定义为M=Max−Min。</p>
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>第一行，一个数为N（N&lt;=20）;
第二行，N个数(1&lt;=每个数字&lt;=5)。
</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>极差M。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>3
1 2 3
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>2</code></pre>
  </div>
 </div>
</div>
