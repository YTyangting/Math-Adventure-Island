  OO3-3 有序顺序表类的合并运算
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>﻿请设计有序顺序表类SortedSeqList，实现集合运算。</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入两行，第1行是正整数na；第2行是na个增序的整数，请用它们构造线性表对象A。
第3行是正整数nb；第4行是nb个增序的整数，请用它们构造线性表对象B。
题目保证0&lt;n, m&lt;100。</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出一行，是A和B的合并的线性表的数值。</code></pre>
  </div>

   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">

1 3 5 7 9
4
2 4 6 8
</code></pre>
  </div>

   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
