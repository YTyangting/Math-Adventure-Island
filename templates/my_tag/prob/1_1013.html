<div class="post">
 <div class="prob-titile">
  OO4-1 向量类的算术运算符的重载
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>﻿请设计向量类Vector3，其中数据成员为x,y,z，均为整数类型。实现向量的算术运算符的重载。运算符*，即表示向量间的叉积，也表示向量与标量的乘法。</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入四行，第一行是整数k；之后的三行，分别是向量v1,v2,v3，每行是一个向量的三个整数。</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出两行，分别是(v1+v2-v3)*k，(v1*v2*v3)*k的值。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>3
1 0 0
0 1 0
1 0 1
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>0 3 -3
0 3 0
</code></pre>
  </div>
 </div>
</div>
