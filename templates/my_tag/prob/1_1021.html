<div class="post">
 <div class="prob-titile">
  OO6-3 高精度整数集合类的插入排序
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>﻿请设计高精度整数集合类BigIntArray，实现排序运算。
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入n+1行，第一行是正整数n；之后的n行，每行是长度不超过1万位的高精度整数。</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出n行，每行一个高精度整数，按增序排列。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>4
123456789
9123456789
1024
88
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>88
1024
123456789
9123456789
</code></pre>
  </div>
 </div>
</div>
