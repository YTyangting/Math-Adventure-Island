  偷拍硕哥2
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>﻿出题人经过千辛万苦终于来到了宿舍，此时硕哥正在打团。尽管智障的出题人很小心，他的偷拍依然被硕哥发现了。眼看硕哥站起来要打他，出题人赶紧说出了一道题，试图阻止爱思考的硕哥1s，假设现在你是硕哥，想要拿出题人祭天，那么你需要在1s内算出答案。
题目如下：
给出正整数n，求a+b的最大值
其中a，b为正整数，a&lt;=n且b&lt;=n且gcd(a,b)=1
ps：gcd是最大公约数
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>第一行一个正整数n</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出一个整数 即a+b的最大值</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>2

</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>3
</code></pre>
  </div>
 </div>
</div>
