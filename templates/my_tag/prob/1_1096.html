<div class="post">
 <div class="prob-titile">
  2-5 二进制表达式求值
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>﻿一天，小明和小璐去拜访他们的小学数学老师。聊到小时候的算术计算，小明和小璐说，他们再也不用担心粗心出错了，因为他们会编程了。
输入一个只包含加法和乘法的算术表达式，其中请你编程计算、输出表达式的值。所有运算数是二进制数，并且大于0。

</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入一行，保证是一个合法的表达式，其中只包含0、1、+、*。所有运算数、中间运算结果、最终运算结果均在4个字节的整数范围内。</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出一行，一个十进制整数，表示这个表达式的值。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>1+101*101+100
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>30
</code></pre>
  </div>
 </div>
</div>
