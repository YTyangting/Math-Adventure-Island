<div class="post">
 <div class="prob-titile">
  序列之争1
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>﻿输入一个长度为n的整数序列，从中找出一段长度不超过m的连续子序列，使得这个子序列的元素和最大。


100%满足n,m&lt;=300000</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>第一行两个数n,m（ps：若m&amp;gt;=1,则至少选择一个数字）</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>第二行有n个数，要求在n个数找到最大子序和
一个数，即他们的最大子序和</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>6 4
1 -3 5 1 -2 3
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>7
</code></pre>
  </div>
 </div>
</div>
