<div class="post">
 <div class="prob-titile">
  序列之争6
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>﻿输入m个长度为n的整数序列，从每个序列里选择一个数字出来，对他们求和得到一个新的数，求前n小的n个新的数。


100%满足m&lt;=100,n&lt;=2000,其他所有数据（包括答案）在int范围内</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>第一行一个数字t，表示数据组数
下一行两个数m,n（注意输入时是m在前，n在后）
接下来m行，每行有n个数</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>对于每组数据，输出一行，包括用空格隔开的n个数，即前n小的n个新的数</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>2
2 3
3 2 1
2 2 3
2 1
3
2
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>3 3 4
5
</code></pre>
  </div>
 </div>
</div>
