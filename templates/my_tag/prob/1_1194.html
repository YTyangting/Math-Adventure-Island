 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>将一个十进制整数m转换成r进制整数的字符串表示形式。
    1. 编写函数void trdec(char *str,int idec,int ibase)，其功能是将十进制整数idec转换为ibase进制数的字符串表示形式，将得到的字符串保存到str指向的字符数组中。
    2. 编写main函数,接收键盘输入的一个整数，调用trdec函数分别将该整数转换为二进制、八进制及十六进制数的字符串表示形式，将转换后得到的三个字符串按如下格式输出。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>26
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>11O1OB,32Q,1AH
</code></pre>
  </div>
