 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>你和你的朋友，两个人一起玩石子游戏：桌子上有一堆石头，每次你们轮流拿掉 1 - 3 块石头。 拿掉最后一块石头的人就是获胜者。你作为先手。
你们是聪明人，每一步都是最优解。请判断你是否可以在给定石头数量的情况下赢得游戏。如果你能赢得游戏，输出Yes，否则输出No。</code></pre>
  </div>

</code></pre>

  <h3>
   输出样例
  </h3>

</code></pre>
