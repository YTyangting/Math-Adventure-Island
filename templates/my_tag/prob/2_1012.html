<div class="post">
 <div class="prob-titile">
  (ty 1-4) 硬币翻转
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code><p>﻿有一串硬币排成一排，有的正面向上，有的反面向上。你可以对这串硬币进行翻转操作。 一次翻转操作是指你可以任意选择一个长度k，把从第一个硬币开始连续的k个硬币翻面。 问最少进行多少次翻转操作可以使这串硬币全部正面向上。</p>
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>一个字符串，长度不超过1000000,其中'0'表示反面，'1'表示正面</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>一个整数，表示最少翻转次数</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>10
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>2
</code></pre>
  </div>
 </div>
</div>
