<div class="post">
 <div class="prob-titile">
  G7-1 统计不及格人数
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code><p>统计《c语言》课程中不及格的人数。要求使用数组来存储学生成绩（成绩是整数）</p>
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入包含两行： 第一行为N，表示成绩序列的长度(N &lt;= 100)； 第二行为N个成绩（整数，满分100分），每个成绩之间以一个空格分开；</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code> 输出为N个成绩中不及格的成绩个数。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>3
100 50</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>1</code></pre>
  </div>
 </div>
</div>
