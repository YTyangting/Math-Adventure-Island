<div class="post">
 <div class="prob-titile">
  B3-1 整数中的数字
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code><p>南京的冬天阴冷潮湿，今天外面下着冰冷的雨雪，小明和小璐只好在教室一起玩玩整数的游戏。 小明随意指定了两个整数xmin和xmax，1&lt;=xmin&lt;=xmax&lt;=100万，然后问小璐，从xmin到xmax中，[0,9]中的哪个数字，出现最多呢？如果有多个数字出现的次数最多，那么输出其中最小的数字。</p>

<p>（样例解释：97 98 99 100 101 102 103中，0出现了5次，1出现了5次）</p>
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>两个整数xmin和xmax</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出符合题意最小的数字</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>97 103
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>0
</code></pre>
  </div>
 </div>
</div>
