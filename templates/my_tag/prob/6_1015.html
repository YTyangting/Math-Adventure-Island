<div class="post">
 <div class="prob-titile">
  B3-2 约瑟夫问题
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code><p>一天，小明和小璐在聊天时，回忆起一个童年的游戏。现在他们知道这个游戏的专业名称是“约瑟夫问题”。 N个人排成一圈，按照逆时针方向，各个人的编号从1到N。从第1个人开始从1报数，报到K的人，自动出圈。然后继续从下个人开始，从1报数，报到K的人，自动出圈。重复以上步骤，直至圈中剩余一人。</p>
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入一行，整数n和k。 n和k均为小于1万的正整数。</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出一行，圈中最后一人的编号。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>5 3
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>4
</code></pre>
  </div>
 </div>
</div>
