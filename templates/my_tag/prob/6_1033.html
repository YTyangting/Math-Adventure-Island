  B5-7 玩整数
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code><p>一天，小璐随手写了一个整数x，问小明：将用x中的数字组成的最大整数记作xmax，将用x中的数字组成的最小整数记作xmin，你能快速的算出xmax-xmin=？ 看着这么乱的数字，从小就粗心大意的小明，决定编程。</p>
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入一行，整数x，1&lt;=x&lt;=1亿。 </code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出一行，1个整数，表示xmax-xmin的值。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>578124
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>750843
</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent2">
   <pre><code>aaaaaaaaaaaa 
aaaa

</code></pre>
  </div>

   输出样例
  </h3>

</code></pre>
  </div>
 </div>
