 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>第一行输入正整数n，第二行输入n个整数x1,...,xn。输出这n个数的最大公约数。
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>第一行输入正整数n，第二行输入n个整数x1,…,xn。</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出这n个数的最大公约数。</code></pre>
  </div>

35 75 50 100
</code></pre>

   输出样例
  </h3>

</code></pre>
