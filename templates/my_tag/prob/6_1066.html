 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>自定义整数数组的输出函数Output(...)；在main()函数中，定义一个整数数组a；输入整数n（n&lt;=10000），再输入n个整数；调用Output函数，输出数组中的所有值。
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入整数n（n&lt;10000），再输入n个整数</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出数组中的所有值</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>5
1 3 2 5 4
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>1 3 2 5 4
</code></pre>
  </div>
 </div>
