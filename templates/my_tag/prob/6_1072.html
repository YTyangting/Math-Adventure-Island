<div class="post">
 <div class="prob-titile">
  A7-7  数组的右移函数
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>自定义整数数组的右移函数MoveRight(...)；编写main()函数，定义一个整数数组a；输入整数n（n&lt;=10000），再输入n个整数；再输入一个正整数k；k次调用MoveRight函数后；输出数组中的所有值。
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>再输入n个整数；再输入一个正整数k</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出k次调用后，数组中的所有值。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>5
1 3 2 5 4
3
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>2 5 4 1 3 
</code></pre>
  </div>
 </div>
</div>
