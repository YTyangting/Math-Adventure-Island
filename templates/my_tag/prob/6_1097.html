<div class="post">
 <div class="prob-titile">
  A9-7  数组中所有极大值
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code><p>自定义函数FindMaxs，输出某个数组中的所有极大值。 编写main()函数，定义两个整数数组a,b（空间大小均不超过10000）；输入正整数n1和n2；然后输入n1个整数存入数组a，输入n2个整数存入数组b；分别调用FindMaxs函数，并分别输出所有极大值。</p>
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入正整数n1和n2；然后输入n1个整数存入数组a，输入n2个整数存入数组b</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>分别输出所有极大值</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>5 6
1 2 3 1 2
2 1 3 5 7 1
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>3 2
2 7 1
</code></pre>
  </div>
 </div>
</div>
