<div class="post">
 <div class="prob-titile">
  A10-3  数组的去重
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>自定义函数Unique，剔除某个数组中的重复数。 编写main()函数，定义两个整数数组a1,a2（空间大小均不超过10000）；输入正整数n1和n2；然后输入n1个整数存入数组a1，输入n2个整数存入数组a2；分别调用Unique函数，分别输出数组a1,a2中的不重复的数字。
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>输入正整数n1和n2；然后输入n1个整数存入数组a1，输入n2个整数存入数组a2</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>分两行分别输出数组a1,a2中的不重复的数字</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>5 6
5 2 3 5 1
5 11 4 11 4 5
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>5 2 3 1
5 11 4
</code></pre>
  </div>
 </div>
</div>
