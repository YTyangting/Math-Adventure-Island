 <div class="prob-titile">
  DS5-1  根据含空指针标记的先序序列创建二叉树
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>自定义二叉链表结构，用于存储二叉树。结点中的数据域是字符类型。
设计函数Create (……)，根据先序序列（含空指针标记），创建二叉树。
编写main()函数，读入含空指针标记的先序序列（用星号表示空指针），序列长度小于1000。调用Create等函数，创建二叉树，输出中序遍历序列。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>ABD**E**C**
</code></pre>
  </div>
  <h3>
   输出样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">
   <pre><code>DBEAC
</code></pre>
  </div>
 </div>
</div>
