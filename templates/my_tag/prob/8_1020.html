  A6-3  最大公约数专题：多个分数的加法
 </div>
 <div class="post-content">
  <h3>
   题目描述
  </h3>
  <div class="lead2">
   <pre><code>第一行输入整数n。之后输入n行，每行任意两个整数ai,bi，均大于0。输出b1/a1+…+bn/an的分数形式，要求化简分数。
</code></pre>
  </div>
  <h3>
   输入格式
  </h3>
  <div class="lead2">
   <pre><code>第一行输入整数n。之后输入n行，每行任意两个整数ai,bi，均大于0。</code></pre>
  </div>
  <h3>
   输出格式
  </h3>
  <div class="lead2">
   <pre><code>输出b1/a1+…+bn/an的分数形式，要求化简分数。</code></pre>
  </div>
  <h3>
   输入样例
  </h3>
  <div class="discriptfont sampleboard" id="sampleInputContent1">
   <pre><code>3
1 2
1 3 
1 4 
</code></pre>
  </div>

  </h3>
  <div class="discriptfont sampleboard" id="sampleOutputContent1">

</code></pre>
